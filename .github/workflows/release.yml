name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: epub3_to_2-windows-amd64.exe
            use_upx: true
          - os: ubuntu-latest
            asset_name: epub3_to_2-linux-amd64
            use_upx: true
          - os: macos-latest  
            asset_name: epub3_to_2-macos-arm64.dmg
            use_upx: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev libxml2-dev libxslt-dev

      - name: Setup UPX (for Windows and Linux)
        if: matrix.use_upx == true
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter lxml tkinterdnd2

      - name: Build with PyInstaller
        shell: bash  
        run: |
          pyinstaller --clean --noconfirm --onefile --windowed --name epub3_to_2 \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            epub3_to_2.py

      - name: Package and Generate Checksum
        shell: bash
        run: |
          cd dist
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv epub3_to_2.exe ${{ matrix.asset_name }}
          elif [ "$RUNNER_OS" == "macOS" ]; then
            hdiutil create -volname "EPUB3_to_2_Converter" -srcfolder epub3_to_2.app -ov -format UDZO ${{ matrix.asset_name }}
          else
            mv epub3_to_2 ${{ matrix.asset_name }}
          fi
          
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          else
            shasum -a 256 ${{ matrix.asset_name }} > ${{ matrix.asset_name }}.sha256
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
