name: Build and Release

on:
  push:
    tags:
      - 'v*'  
  workflow_dispatch:  

permissions:
  contents: write 

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev libxml2-dev libxslt-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter lxml tkinterdnd2

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name epub3_to_2 \
            --collect-all customtkinter \
            --collect-all tkinterdnd2 \
            epub3_to_2.py

      - name: Rename and Package Assets
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            mv epub3_to_2.exe epub3_to_2-windows-amd64.exe
          elif [ "$RUNNER_OS" == "macOS" ]; then
            zip -r epub3_to_2-macos.zip epub3_to_2.app
          else
            mv epub3_to_2 epub3_to_2-linux-amd64
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}
          path: dist/epub3_to_2-*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
